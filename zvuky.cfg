#[output_pin beeper]
#pin: PD12
#pwm: True
#value: 0
#shutdown_value: 0
#cycle_time: 0.001
#scale: 1

[pwm_cycle_time beeper]
pin: PD12
value: 0
shutdown_value: 0
cycle_time: 0.001


[gcode_macro M300] #zvuk1
gcode:  
  {% set S = params.S|default(1000)|int %} ; S sets the tone frequency
  {% set P = params.P|default(100)|int %} ; P sets the tone duration
  {% set L = 0.1 %} ; L varies the PWM on time, close to 0 or 1 the tone gets a bit quieter. 0.5 is a symmetric waveform
  {% if S <= 0 %} ; dont divide through zero
  {% set F = 1 %}
  {% set L = 0 %}
  {% elif S >= 10000 %} ;max frequency set to 10kHz
  {% set F = 0 %}
  {% else %}
  {% set F = 1/S %} ;convert frequency to seconds 
  {% endif %}
    SET_PIN PIN=beeper VALUE={L} CYCLE_TIME={F} ;Play tone
  G4 P{P} ;tone duration
    SET_PIN PIN=beeper VALUE=0

[gcode_macro M301] #zvuk PRINT_START
gcode:
    M300 S1100
    M300 S1650 

[gcode_macro M302]  #zvuk PRINT_END
gcode:
  {% set tones = [1000, 1500, 2000, 2500, 3000, 2500, 2000, 1500, 1000] %} ; S sets the tone frequency
  {% for count in tones %}
  {% set cytime = 1 / count %}
    SET_PIN PIN=beeper VALUE={0.5} CYCLE_TIME={cytime} ;Play tone
  G4 P50 ;tone duration
    SET_PIN PIN=beeper VALUE=0
  {% endfor %}

