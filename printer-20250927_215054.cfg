[printer]
kinematics: corexy
max_velocity: 800  
max_accel: 4000    			#Max 4000
max_z_velocity: 15 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: z,-y,x

[resonance_tester]
probe_points: 150, 150, 20
accel_chip: adxl345

[input_shaper]
#shaper_freq_x: 58.2
#shaper_type_x: mzv
#shaper_freq_y: 43.8
#shaper_type_y: mzv
damping_ratio_x: 0.033
damping_ratio_y: 0.049




#####################################################################
# 	X/Y Stepper Settings
#####################################################################
                                                                   ##
## X Stepper on MOTOR0(B Motor)                                    ##
[stepper_x]                                                        ##      
step_pin: PF13                                                     ##
dir_pin: !PF12                                                     ##
enable_pin: !PF14                                                  ##
rotation_distance: 40                                              ##
microsteps: 16                                                     ##
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper    ##
endstop_pin: tmc2240_stepper_x:virtual_endstop #PG6                ##
position_min: 0                                                    ##
position_endstop: 300                                              ##   
position_max: 300                                                  ## 
homing_speed: 75   #Max 100                                        ##    
homing_retract_dist: 5                                             ##
homing_positive_dir: true                                          ##  
                                                                   ## 
[tmc2240 stepper_x]                                                ## 
cs_pin: PC4                                                        ## 
diag0_pin: !PG6                                                    ## 
spi_software_miso_pin: PA6                                         ## 
spi_software_mosi_pin: PA7                                         ## 
spi_software_sclk_pin: PA5                                         ## 
interpolate: true                                                  ## 
run_current: 0.8                                                   ## 
stealthchop_threshold: 0                                           ## 
driver_SGT: 1                                                      ## 
#####################################################################
## Y Stepper on MOTOR1 (A Motor)
[stepper_y]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2240_stepper_y:virtual_endstop #PG9
position_min: 0
position_endstop: 300
position_max: 300
homing_speed: 75  #Max 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc2240 stepper_y]
cs_pin: PD11
diag0_pin: !PG9
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
interpolate: true
run_current: 0.8
stealthchop_threshold: 0 
driver_SGT: 1
#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left on MOTOR2_1
[stepper_z]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
#endstop_pin: probe:z_virtual_endstop      # stanky: zakomentovano kvuli EDDY, nahrazeno radkem nize
endstop_pin: !EBBCan:PB5                    # stanky: zakomentovat, pokud pouziju zpet z_virtual_endstop
#position_endstop: 0                         # stanky: zakomentovat, pokud pouziju zpet z_virtual_endstop
homing_retract_dist: 0
position_max: 290
position_min: -5
homing_speed: 8
second_homing_speed: 3

[tmc2240 stepper_z]
cs_pin: PC6
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
interpolate: true
stealthchop_threshold: 0 
run_current: 0.8
#hold_current: 0.8
##	Z1 Stepper - Rear Left on MOTOR3
[stepper_z1]
step_pin: PE2 #PG4
dir_pin:  PE3 #!PC1
enable_pin: !PD4 #!PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2240 stepper_z1]
cs_pin:  PE1 
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
interpolate: true
stealthchop_threshold: 0
run_current: 0.8
#hold_current: 0.8
##	Z2 Stepper - Rear Right on MOTOR4
[stepper_z2]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2240 stepper_z2]
cs_pin: PF2
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
interpolate: true
stealthchop_threshold: 0 
run_current: 0.8
#hold_current: 0.8
##	Z3 Stepper - Front Right on MOTOR5
[stepper_z3]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2240 stepper_z3]
cs_pin: PE4
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
interpolate: true
stealthchop_threshold: 0 
run_current: 0.8
#hold_current: 0.8

#####################################################################
# 	Extruder
#####################################################################

#	E0 on MOTOR6

[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
rotation_distance: 13.1084337358 #22.6789511	
gear_ratio: 50:17				#BMG Gear Ratio
microsteps: 16
full_steps_per_rotation: 200	#200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: EBBCan: PB13
sensor_type: Generic 3950 #ATC Semitec 104GT-2
sensor_pin: EBBCan: PA3 # TE0 Position
min_temp: 10
max_temp: 310
max_power: 1.0
min_extrude_temp: 170
#control = pid
#pid_kp = 21.981
#pid_ki = 3.330
#pid_kd = 36.268
pressure_advance: 0.04
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 160.0
max_extrude_cross_section: 160.0

#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
#min_temp: 0
#max_temp: 250

[tmc2209 extruder]
uart_pin: EBBCan: PA15
interpolate: false
run_current: 0.5
hold_current: 0.2
sense_resistor: 0.110
stealthchop_threshold: 0


