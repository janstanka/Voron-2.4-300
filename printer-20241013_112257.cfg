#shutdown_speed: 0.0
#kick_start_time: 5.0
#heater: heater_bed
#heater_temp: 60
#fan_speed: 1.0

#####################################################################
# 	LED Control
#####################################################################

[output_pin caselight]
#Chamber Lighting - HE1 Connector (Optional)
pin: PA3
pwm:true
shutdown_value: 0
value:0
cycle_time: 0.01

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[quad_gantry_level]
gantry_corners:
	-60,-10
	360,370
##	Probe points
points:
  50,25
	50,225
	250,225
	250,25
speed: 800
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10

#####################################################################
#	Teploty
#####################################################################

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100
[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor EBB_NTC]
sensor_type: Generic 3950
sensor_pin: EBBCan: PA2

[temperature_sensor Komora]
sensor_type: Generic 3950
sensor_pin: PF4



#####################################################################
# 	Macros
#####################################################################

[gcode_macro G32]
gcode:
    BED_MESH_CLEAR
    G28
    Clean_nozzle
    QUAD_GANTRY_LEVEL
    G28
    G0 X150 Y150 Z30 F3600



[gcode_macro PRINT_START]
gcode:
    STATUS_HOMING
    G28
    STATUS_HEATING
    {% set BED_TEMP = params.BED_TEMP|default(100)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(150)|float %}
    M190 S{BED_TEMP}
    M104 S150
    M109 S150 ; Set non dripping hotend temperature
    G90
    M83
    STATUS_CLEANING
    STATUS_CALIBRATING_Z
    G28 Z
    STATUS_LEVELING
    G32
    STATUS_CLEANING
    BED_MESH_CLEAR
    STATUS_MESHING
    BED_MESH_CALIBRATE
    #CARTOGRAPHER_TOUCH 
    G1 X25 Y1 Z5 F15000
    G1 Z0.4 F3000
    STATUS_HEATING
    M109 S{EXTRUDER_TEMP}


[gcode_macro PRINT_START_PURGE]
gcode:
    G92 E0
    STATUS_BUSY
    G1 X25 Y1 Z0.4 F3000
    # Resetování vzdálenosti extruderu
    G92 E0
    # Očištění trysky. Následující gcode nám pomalu posunuje trysku 14cm doprava a extruder vytlačí 30mm filamentu
    # První pohyb je pomalejší a delší (až do 12cm), a následuje rychlé očištění 2 cm na výsledných 14 cm
    G1 X160 E30 F600
    G1 X200 F5000
    G92 E0
    # Následně před samotným tiskem proběhne krátká retrakce a resetování vzdálenosti extruderu
    G1 E-0.2 F600
    G92 E0
    STATUS_PRINTING

[gcode_macro PRINT_END]
gcode:
    G91
    G1 X10 Z10 F20000
    STATUS_PART_READY
    G90
    G1 X50 Y25 F15000
    MMU_EJECT
    G90
    G1 X290 Y290 F15000

    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    TURN_OFF_HEATERS
    M400
    M106 S0
    M84
    STATUS_READY
    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    #PRINT_END_MY
    



[bed_mesh]
speed: 800
#horizontal_move_z: 0
mesh_min: 15, 15
mesh_max: 280, 250
probe_count: 15, 15
algorithm: bicubic
zero_reference_position: 125, 125    

[homing_override]
axes: xyz
gcode:
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  {% if home_all or 'X' in params %}
    _HOME_X
  {% endif %}
  
  {% if home_all or 'Y' in params %}
    _HOME_Y
  {% endif %}
  
  {% if home_all or 'Z' in params %}
    G4 P100
    G1 X150 Y150 F36000
    G28 Z
    G1 Z10
  {% endif %}


[shaketune]
# result_folder: ~/printer_data/config/ShakeTune_results
#    The folder where the results will be stored. It will be created if it doesn't exist.
# number_of_results_to_keep: 3
#    The number of results to keep in the result_folder. The oldest results will
#    be automatically deleted after each runs.
# keep_raw_csv: False
#    If True, the raw CSV files will be kept in the result_folder alongside the
#    PNG graphs. If False, they will be deleted and only the graphs will be kept.
# show_macros_in_webui: True
#    Mainsail and Fluidd doesn't create buttons for "system" macros that are not in the
#    printer.cfg file. If you want to see the macros in the webui, set this to True.
# timeout: 300
#    The maximum time in seconds to let Shake&Tune process the CSV files and generate the graphs.



