#####################################################################
# 	Fan Control
#####################################################################

[fan]
##	Print Cooling Fan - CNC_FAN0
pin: EBBCan: PA1
kick_start_time: 0.5
off_below: 0.10

[heater_fan hotend_fan]
##	Hotend Fan - CNC_FAN1
pin: EBBCan: PA0
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

[heater_fan controller_fan]
pin: PA8
kick_start_time: 0.5
heater: heater_bed
heater_temp: 10.0
fan_speed: 0.6

[heater_fan controller_fan2]
pin: PE5
kick_start_time: 0.5
heater: heater_bed
heater_temp: 10.0
fan_speed: 0.6

#[heater_fan exhaust_fan]
