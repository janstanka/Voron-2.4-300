# 	LED Control
#####################################################################

[output_pin caselight]
#Chamber Lighting - HE1 Connector (Optional)
pin: PA3
pwm:true
shutdown_value: 0
value:0
cycle_time: 0.01

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 600 #1800 puvodne
gcode:
    STATUS_OFF
    SET_PIN PIN=caselight VALUE=0    # vypne osvetleni
    TURN_OFF_HEATERS
    M84

[quad_gantry_level]
gantry_corners:
	-60,-10
	360,370
##	Probe points
points:
  50,25
	50,250    # puvodne 50,225
	250,250    # puvodne 250, 225
	250,25
speed: 200
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10



