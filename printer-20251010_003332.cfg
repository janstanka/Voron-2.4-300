[gcode_macro PRINT_START]
gcode:
    SET_PIN PIN=caselight VALUE=0.08
    STATUS_HOMING
    G28
    STATUS_HEATING
    {% set BED_TEMP = params.BED_TEMP|default(100)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(150)|float %}
    M190 S{BED_TEMP}
    M104 S150
    M109 S150 ; Set non dripping hotend temperature
    G90
    M83
    
    STATUS_LEVELING
    QUAD_GANTRY_LEVEL # doplneno stanky
    STATUS_CALIBRATING_Z
    G28 Z
    # G32 # zakomentovano stanky
    BED_MESH_CLEAR
    STATUS_MESHING
    BED_MESH_CALIBRATE ADAPTIVE=1
    
   # CARTOGRAPHER_TOUCH   #zakomentovat
    G1 X25 Y1 Z5 F15000
    G1 Z0.4 F3000
    STATUS_HEATING
    M109 S{EXTRUDER_TEMP}
    
    M301  # zapipej start tisku
  

[gcode_macro PRINT_START_PURGE]
gcode:
    G92 E0
    STATUS_BUSY
    G1 X25 Y1 Z0.4 F3000
    # Resetování vzdálenosti extruderu
    G92 E0
    STATUS_CLEANING
    # Očištění trysky. Následující gcode nám pomalu posunuje trysku 14cm doprava a extruder vytlačí 30mm filamentu
    # První pohyb je pomalejší a delší (až do 12cm), a následuje rychlé očištění 2 cm na výsledných 14 cm
    G1 X160 E30 F600
    G1 X200 F5000
    G92 E0
    # Následně před samotným tiskem proběhne krátká retrakce a resetování vzdálenosti extruderu
    G1 E-0.2 F600
    G92 E0
    STATUS_PRINTING

[gcode_macro PRINT_END]
gcode:
    G91  # relative coordinates
    G1 X10 Z10 F20000 # posun X 10 Z 10 rychlosti F20000
    M400  # Wait for current moves to finish
    G1 E-1.5  # pridana retrakce
    STATUS_PART_READY
    # G90   # absolut coordinates
    # G1 X50 Y25 F15000  # zakomentovano stanky
    # MMU_EJECT  # zakomentovano stanky
    G90
    G1 X290 Y290 F15000  # zaparkovani do praveho zadniho rohu
    M400  # Wait for current moves to finish
    # CLEAN_NOZZLE
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    TURN_OFF_HEATERS
    # G1 X10 Y10  # zakomentovano stanky
    # M400  # zakomentovano stanky
    M106 S0   #vypnuti ofuku vytisku
    # M84 # uvoleneni motoru - zakomentovano stanky
    STATUS_READY
    BED_MESH_CLEAR
    SET_PIN PIN=caselight VALUE=0    # vypne osvetleni
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    #PRINT_END_MY
    M302  # zapipej konec

